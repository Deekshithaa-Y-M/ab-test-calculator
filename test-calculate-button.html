<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Calculate Button Functionality</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .test-section {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .test-pass {
            background: #d1fae5;
            border-left: 4px solid #10b981;
        }
        .test-fail {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Calculate Button Functionality Test</h1>
        </header>

        <div class="test-section">
            <h2>Automated Tests</h2>
            <div id="test-results"></div>
            <button onclick="runTests()" class="calculate-button">Run Tests</button>
        </div>

        <div class="test-section">
            <h2>Manual Test - Try the Calculator</h2>
            <section class="input-section">
                <div class="input-card">
                    <h2>Group A (Control)</h2>
                    <div class="input-group">
                        <label for="control-visitors">Visitors</label>
                        <input type="number" id="control-visitors" min="0" step="1" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label for="control-conversions">Conversions</label>
                        <input type="number" id="control-conversions" min="0" step="1" placeholder="0">
                    </div>
                </div>

                <div class="input-card">
                    <h2>Group B (Variant)</h2>
                    <div class="input-group">
                        <label for="variant-visitors">Visitors</label>
                        <input type="number" id="variant-visitors" min="0" step="1" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label for="variant-conversions">Conversions</label>
                        <input type="number" id="variant-conversions" min="0" step="1" placeholder="0">
                    </div>
                </div>
            </section>

            <button id="calculate-btn" class="calculate-button">Calculate Significance</button>

            <section id="results-section" class="results-section hidden">
                <div class="results-content">
                    <div class="result-item">
                        <span class="result-label">Control Conversion Rate:</span>
                        <span id="control-rate" class="result-value">-</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Variant Conversion Rate:</span>
                        <span id="variant-rate" class="result-value">-</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Confidence Level:</span>
                        <span id="confidence-level" class="result-value">-</span>
                    </div>
                    <div id="verdict-badge" class="verdict-badge"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="calculator.js"></script>
    <script>
        function runTests() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '';
            let passCount = 0;
            let failCount = 0;

            function addTestResult(name, passed, details) {
                const div = document.createElement('div');
                div.className = `test-result ${passed ? 'test-pass' : 'test-fail'}`;
                div.innerHTML = `<strong>${passed ? '✓' : '✗'} ${name}</strong><br>${details}`;
                resultsDiv.appendChild(div);
                if (passed) passCount++;
                else failCount++;
            }

            // Test 1: performAnalysis function exists
            addTestResult(
                'performAnalysis function exists',
                typeof performAnalysis === 'function',
                'The performAnalysis function should be defined'
            );

            // Test 2: Valid inputs produce results
            const validResult = performAnalysis(
                { visitors: 1000, conversions: 100 },
                { visitors: 1000, conversions: 120 }
            );
            addTestResult(
                'Valid inputs produce results',
                validResult !== null && validResult.controlRate !== undefined,
                validResult ? `Got result: ${JSON.stringify(validResult)}` : 'No result returned'
            );

            // Test 3: Empty inputs show error
            const emptyResult = performAnalysis(
                { visitors: '', conversions: '' },
                { visitors: 1000, conversions: 100 }
            );
            addTestResult(
                'Empty inputs show error',
                emptyResult === null,
                'Should return null for empty inputs'
            );

            // Test 4: Invalid inputs (conversions > visitors) show error
            const invalidResult = performAnalysis(
                { visitors: 100, conversions: 200 },
                { visitors: 1000, conversions: 100 }
            );
            addTestResult(
                'Invalid inputs show error',
                invalidResult === null,
                'Should return null when conversions > visitors'
            );

            // Test 5: Calculate button exists and has event listener
            const calculateBtn = document.getElementById('calculate-btn');
            addTestResult(
                'Calculate button exists',
                calculateBtn !== null,
                'Button should be present in DOM'
            );

            // Test 6: Results section exists
            const resultsSection = document.getElementById('results-section');
            addTestResult(
                'Results section exists',
                resultsSection !== null,
                'Results section should be present in DOM'
            );

            // Test 7: Conversion rates are calculated correctly
            const testResult = performAnalysis(
                { visitors: 1000, conversions: 100 },
                { visitors: 1000, conversions: 150 }
            );
            const expectedControlRate = 10.0;
            const expectedVariantRate = 15.0;
            addTestResult(
                'Conversion rates calculated correctly',
                testResult && testResult.controlRate === expectedControlRate && testResult.variantRate === expectedVariantRate,
                `Expected: Control=${expectedControlRate}%, Variant=${expectedVariantRate}%. Got: Control=${testResult?.controlRate}%, Variant=${testResult?.variantRate}%`
            );

            // Summary
            const summary = document.createElement('div');
            summary.className = 'test-result';
            summary.style.background = '#f3f4f6';
            summary.style.fontWeight = 'bold';
            summary.innerHTML = `<strong>Summary:</strong> ${passCount} passed, ${failCount} failed out of ${passCount + failCount} tests`;
            resultsDiv.appendChild(summary);
        }

        // Run tests on load
        window.addEventListener('load', () => {
            setTimeout(runTests, 500);
        });
    </script>
</body>
</html>
